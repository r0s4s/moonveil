[Server]
host = 0.0.0.0
port = 8889
debug = True

[Database]
databaseuri = sqlite:////moonveil/data/moonveil.db

[Security]
secretkey = CHANGE_ME_USE_ENV_VARIABLE

[Files]
resolvers = config/resolvers.txt
wordlist = config/wordlist.txt

[Commands]
subfinder = subfinder -list "{domains}" -rlist "{resolvers}" -recursive -all -t {threads} | sort -u
waybackurls = cat "{domains}" | waybackurls | sort -u
alterx = alterx -list "{domains}" -enrich -limit {limit} -silent | dnsx --silent | sort -u
shuffledns = shuffledns -d "{domain}" -r "{resolvers}" -w "{wordlist}" -t {threads} -mode bruteforce
httpx = httpx -l "{subdomains}" -o "{output_file}" -json -sc -ct -location -server -td -ip -cname -cdn -probe -fc 404,503 -t {threads} -screenshot -esb -srd "{screenshots_path}"
